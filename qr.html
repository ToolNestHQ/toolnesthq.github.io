<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صانع الباركود - ToolNestHQ</title>
    <style>
        body { font-family: sans-serif; background-color: #060813; color: white; text-align: center; padding: 20px; }
        input { padding: 10px; width: 80%; max-width: 300px; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>صانع الباركود (QR Code)</h1>
    <input type="text" id="text" placeholder="اكتب النص أو الرابط هنا...">
    <br>
    <button onclick="generateQR()">إنشاء باركود</button>
    <div id="qr-result" style="margin-top: 20px;"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        function generateQR() {
            document.getElementById("qr-result").innerHTML = "";
            new QRCode(document.getElementById("qr-result"), document.getElementById("text").value);
        }
    </script>
    <br>
    <a href="index.html" style="color: #aaa;">العودة للرئيسية</a>

</body>
</html>

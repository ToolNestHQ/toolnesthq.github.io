<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة الخصم والضريبة | ToolnestHQ</title>
    <!-- خطوط قوقل -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #070a13;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --text-muted: #64748b;
            --accent-gradient: linear-gradient(135deg, #10b981 0%, #059669 100%); /* تدرج أخضر مالي */
            --hover-glow: rgba(16, 185, 129, 0.25);
            --input-bg: rgba(0, 0, 0, 0.3);
            --font-ar: 'Cairo', sans-serif;
            --font-en: 'Poppins', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: var(--font-ar);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(16, 185, 129, 0.05), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(5, 150, 105, 0.05), transparent 30%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        html[lang="en"] body {
            font-family: var(--font-en);
        }

        /* شريط التنقل */
        nav {
            width: 100%;
            max-width: 800px;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn:hover { color: var(--text-main); }

        .lang-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .lang-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px var(--hover-glow);
        }

        .container {
            width: 100%;
            max-width: 650px;
            padding: 0 1.5rem 4rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 2.4rem;
            font-weight: 900;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .tool-box {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .input-group.full-width {
            grid-column: span 2;
        }

        .input-group label {
            font-weight: 600;
            font-size: 0.95rem;
            color: #e2e8f0;
        }

        .input-with-symbol {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-with-symbol input {
            width: 100%;
            padding: 1.2rem;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            color: #fff;
            font-size: 1.2rem;
            font-family: var(--font-en);
            font-weight: 700;
            outline: none;
            direction: ltr;
            text-align: right;
            padding-inline-end: 3rem;
        }

        .input-with-symbol input:focus {
            border-color: #10b981;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }

        .symbol {
            position: absolute;
            right: 1.2rem;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 1.1rem;
            direction: ltr;
        }
        
        html[dir="ltr"] .input-with-symbol input { text-align: left; padding-inline-start: 3rem; padding-inline-end: 1.2rem; }
        html[dir="ltr"] .symbol { left: 1.2rem; right: auto; }

        /* منطقة النتائج النهائية */
        .results-area {
            margin-top: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.05rem;
            color: var(--text-muted);
            padding-bottom: 1rem;
            border-bottom: 1px dashed rgba(255,255,255,0.05);
        }

        .result-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .result-val {
            font-family: var(--font-en);
            font-weight: 700;
            color: #fff;
        }

        .final-total {
            font-size: 1.5rem;
            color: #10b981;
            font-weight: 900;
        }

        .ad-slot {
            width: 100%;
            min-height: 90px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px dashed rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            margin: 2rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.1);
            font-size: 0.75rem;
            font-family: var(--font-en);
        }

        @media (max-width: 480px) {
            .tool-box { padding: 2rem 1.2rem; }
            .input-row { grid-template-columns: 1fr; }
            .input-group.full-width { grid-column: span 1; }
            header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="back-btn" id="backBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            <span>الرئيسية</span>
        </a>
        <button class="lang-btn" onclick="toggleLanguage()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            <span id="langText">English</span>
        </button>
    </nav>

    <div class="container">
        <header>
            <h1 id="toolTitle">حاسبة الخصم والضريبة</h1>
            <p id="toolDesc">احسب السعر النهائي لمنتجاتك بعد إضافة الخصومات والضرائب فورياً وبدقة</p>
        </header>

        <div class="ad-slot">Advertisement Space (Top Banner)</div>

        <div class="tool-box">
            
            <div class="input-row">
                <div class="input-group full-width">
                    <label id="lblPrice">السعر الأصلي قبل الخصم:</label>
                    <div class="input-with-symbol">
                        <span class="symbol">$</span>
                        <input type="number" id="inpPrice" placeholder="0.00" oninput="calculateFinal()">
                    </div>
                </div>

                <div class="input-group">
                    <label id="lblDiscount">نسبة الخصم:</label>
                    <div class="input-with-symbol">
                        <span class="symbol">%</span>
                        <input type="number" id="inpDiscount" placeholder="0" oninput="calculateFinal()">
                    </div>
                </div>

                <div class="input-group">
                    <label id="lblTax">نسبة الضريبة:</label>
                    <div class="input-with-symbol">
                        <span class="symbol">%</span>
                        <input type="number" id="inpTax" placeholder="15" value="15" oninput="calculateFinal()">
                    </div>
                </div>
            </div>

            <!-- الفاتورة المصغرة -->
            <div class="results-area">
                <div class="result-row">
                    <span id="lblSaved">مبلغ الخصم (وفرت):</span>
                    <span class="result-val" id="resSaved" style="color: #ef4444;">0.00</span>
                </div>
                <div class="result-row">
                    <span id="lblTaxAmount">قيمة الضريبة المضافة:</span>
                    <span class="result-val" id="resTax">0.00</span>
                </div>
                <div class="result-row">
                    <span id="lblFinal" style="font-weight: 700; color: #fff;">السعر النهائي المطلوب:</span>
                    <span class="result-val final-total" id="resFinal">0.00</span>
                </div>
            </div>

        </div>

        <div class="ad-slot">Advertisement Space (Bottom Banner)</div>
    </div>

    <script>
        const translations = {
            ar: {
                langBtn: "English", backBtn: "الرئيسية",
                title: "حاسبة الخصم والضريبة | ToolnestHQ",
                toolTitle: "حاسبة الخصم والضريبة",
                toolDesc: "احسب السعر النهائي لمنتجاتك بعد إضافة الخصومات والضرائب فورياً وبدقة",
                lblPrice: "السعر الأصلي قبل الخصم:",
                lblDiscount: "نسبة الخصم:",
                lblTax: "نسبة الضريبة (VAT):",
                lblSaved: "مبلغ الخصم (وفرت):",
                lblTaxAmount: "قيمة الضريبة المضافة:",
                lblFinal: "السعر النهائي المطلوب:"
            },
            en: {
                langBtn: "العربية", backBtn: "Home",
                title: "Discount & Tax Calculator | ToolnestHQ",
                toolTitle: "Discount & Tax Calculator",
                toolDesc: "Instantly calculate the final price of your items after applying discounts and taxes",
                lblPrice: "Original Price before discount:",
                lblDiscount: "Discount Percentage:",
                lblTax: "Tax Percentage (VAT):",
                lblSaved: "Discount Amount (You Saved):",
                lblTaxAmount: "Added Tax Amount:",
                lblFinal: "Final Price to Pay:"
            }
        };

        let currentLang = 'ar';

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';

            document.title = translations[currentLang].title;
            document.getElementById('langText').textContent = translations[currentLang].langBtn;
            document.getElementById('backBtn').querySelector('span').textContent = translations[currentLang].backBtn;
            document.getElementById('toolTitle').textContent = translations[currentLang].toolTitle;
            document.getElementById('toolDesc').textContent = translations[currentLang].toolDesc;
            document.getElementById('lblPrice').textContent = translations[currentLang].lblPrice;
            document.getElementById('lblDiscount').textContent = translations[currentLang].lblDiscount;
            document.getElementById('lblTax').textContent = translations[currentLang].lblTax;
            document.getElementById('lblSaved').textContent = translations[currentLang].lblSaved;
            document.getElementById('lblTaxAmount').textContent = translations[currentLang].lblTaxAmount;
            document.getElementById('lblFinal').textContent = translations[currentLang].lblFinal;

            if(currentLang === 'en') {
                document.getElementById('backBtn').querySelector('svg').style.transform = 'rotate(0deg)';
            } else {
                document.getElementById('backBtn').querySelector('svg').style.transform = 'rotate(180deg)';
            }
        }

        function calculateFinal() {
            let price = parseFloat(document.getElementById('inpPrice').value) || 0;
            let discount = parseFloat(document.getElementById('inpDiscount').value) || 0;
            let tax = parseFloat(document.getElementById('inpTax').value) || 0;

            // حماية من الأرقام السالبة الخاطئة
            if(price < 0) price = 0;
            if(discount < 0) discount = 0;
            if(discount > 100) discount = 100;
            if(tax < 0) tax = 0;

            // 1. حساب قيمة الخصم
            let discountAmount = price * (discount / 100);
            
            // 2. السعر بعد الخصم
            let priceAfterDiscount = price - discountAmount;
            
            // 3. حساب الضريبة على السعر المخفض
            let taxAmount = priceAfterDiscount * (tax / 100);
            
            // 4. السعر النهائي
            let finalPrice = priceAfterDiscount + taxAmount;

            // تحديث الواجهة وتنسيق الأرقام لخانتين عشريتين
            document.getElementById('resSaved').textContent = discountAmount.toFixed(2);
            document.getElementById('resTax').textContent = taxAmount.toFixed(2);
            document.getElementById('resFinal').textContent = finalPrice.toFixed(2);
        }
    </script>
</body>
</html>

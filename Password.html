<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد كلمات السر الاحترافي - ToolnestHQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ستايل زجاجي داكن (Dark Glassmorphism) متناسق مع الواجهة الرئيسية */
        :root {
            --bg-dark: #07070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.07);
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --accent-color: #a78bfa;
            --accent-green: #34d399;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.2s ease; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #09090b 100%);
            position: relative;
            overflow: hidden;
        }

        /* توهج خلفي للمظهر الفاخر */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: 10%;
            z-index: 0;
        }

        .tool-container {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .back-link:hover { color: var(--accent-color); transform: translateX(-3px); }

        h1 { 
            font-size: 1.6rem; 
            font-weight: 700; 
            margin-bottom: 25px; 
            text-align: center; 
            background: linear-gradient(to left, #fff, var(--accent-color)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        h1 i {
            color: var(--accent-color);
            -webkit-text-fill-color: initial;
            margin-left: 8px;
        }

        /* شاشة عرض كلمة السر المحدثة */
        .result-box {
            position: relative;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        .result-box input {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.25rem;
            width: 85%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: 1.5px;
            outline: none;
        }
        .copy-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.25rem;
            cursor: pointer;
        }
        .copy-btn:hover { color: var(--accent-green); transform: scale(1.1); }

        /* خيارات التخصيص */
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }
        .setting-row input[type="number"] {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: #fff;
            padding: 6px 10px;
            width: 65px;
            text-align: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1rem;
            outline: none;
        }
        .setting-row input[type="checkbox"] {
            accent-color: var(--accent-color);
            width: 19px;
            height: 19px;
            cursor: pointer;
        }

        /* زر التوليد */
        .generate-btn {
            width: 100%;
            background: var(--accent-color);
            color: #07070a;
            border: none;
            border-radius: 14px;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(167, 139, 250, 0.3);
        }
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(167, 139, 250, 0.5);
            background: #b49bff;
        }
    </style>
</head>
<body>

    <div class="tool-container">
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-right"></i> العودة للرئيسية</a>
        
        <h1><i class="fa-solid fa-shield-halved"></i> مولد كلمات السر</h1>

        <div class="result-box">
            <input type="text" id="password-display" readonly placeholder="اضغط على توليد">
            <button class="copy-btn" id="copy-button" title="نسخ"><i class="fa-regular fa-copy"></i></button>
        </div>

        <div class="settings-list">
            <div class="setting-row">
                <label>طول كلمة السر</label>
                <input type="number" id="length" min="6" max="32" value="12">
            </div>
            <div class="setting-row">
                <label>تضمين أحرف كبيرة (A-Z)</label>
                <input type="checkbox" id="uppercase" checked>
            </div>
            <div class="setting-row">
                <label>تضمين أحرف صغيرة (a-z)</label>
                <input type="checkbox" id="lowercase" checked>
            </div>
            <div class="setting-row">
                <label>تضمين أرقام (0-9)</label>
                <input type="checkbox" id="numbers" checked>
            </div>
            <div class="setting-row">
                <label>تضمين رموز خاصة (!@#$)</label>
                <input type="checkbox" id="symbols" checked>
            </div>
        </div>

        <button class="generate-btn" id="generate-trigger">توليد كلمة سر قوية</button>
    </div>

    <script>
        const display = document.getElementById('password-display');
        const generateBtn = document.getElementById('generate-trigger');
        const copyBtn = document.getElementById('copy-button');
        
        const lengthEl = document.getElementById('length');
        const uppercaseEl = document.getElementById('uppercase');
        const lowercaseEl = document.getElementById('lowercase');
        const numbersEl = document.getElementById('numbers');
        const symbolsEl = document.getElementById('symbols');

        const keys = {
            uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lowercase: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            symbols: '!@#$%^&*()_+~`|}{[]:;?><,./-='
        };

        function generatePassword() {
            let characterPool = '';
            if (uppercaseEl.checked) characterPool += keys.uppercase;
            if (lowercaseEl.checked) characterPool += keys.lowercase;
            if (numbersEl.checked) characterPool += keys.numbers;
            if (symbolsEl.checked) characterPool += keys.symbols;

            if (characterPool === '') {
                alert('الرجاء اختيار خيار واحد على الأقل من الإعدادات!');
                return;
            }

            let password = '';
            const length = parseInt(lengthEl.value);
            
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * characterPool.length);
                password += characterPool[randomIndex];
            }
            
            display.value = password;
            // إعادة شكل الأيقونة للوضع الأصلي عند التوليد الجديد
            copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i>';
            copyBtn.style.color = 'var(--text-secondary)';
        }

        // كود النسخ للحافظة بنقرة واحدة
        copyBtn.addEventListener('click', () => {
            if (!display.value) return;
            navigator.clipboard.writeText(display.value);
            copyBtn.innerHTML = '<i class="fa-solid fa-check"></i>';
            copyBtn.style.color = 'var(--accent-green)';
        });

        generateBtn.addEventListener('click', generatePassword);
    </script>
</body>
</html>

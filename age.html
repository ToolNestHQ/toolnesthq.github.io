<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة العمر الدقيقة | ToolnestHQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #070a13;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --text-muted: #64748b;
            --accent-gradient: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            --hover-glow: rgba(124, 58, 237, 0.25);
            --input-bg: rgba(0, 0, 0, 0.25);
            --font-ar: 'Cairo', sans-serif;
            --font-en: 'Poppins', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: var(--font-ar);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(37, 99, 235, 0.06), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(124, 58, 237, 0.06), transparent 30%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        html[lang="en"] body {
            font-family: var(--font-en);
        }

        /* شريط التنقل */
        nav {
            width: 100%;
            max-width: 800px;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn:hover { color: var(--text-main); }

        .lang-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .lang-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px var(--hover-glow);
        }

        .container {
            width: 100%;
            max-width: 650px;
            padding: 0 1.5rem 4rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 2.4rem;
            font-weight: 900;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* الصندوق الرئيسي للأداة */
        .tool-box {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .input-group label {
            font-weight: 600;
            font-size: 1rem;
            color: #e2e8f0;
        }

        /* حقل اختيار التاريخ الأنيق */
        .input-group input[type="date"] {
            width: 100%;
            padding: 1.2rem;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            color: #fff;
            font-size: 1.1rem;
            font-family: inherit;
            outline: none;
            cursor: pointer;
        }

        .input-group input[type="date"]:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }

        .btn-primary {
            width: 100%;
            padding: 1.1rem;
            border: none;
            border-radius: 16px;
            background: var(--accent-gradient);
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 10px 20px var(--hover-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px var(--hover-glow);
        }

        /* شبكة عرض نتائج العمر */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            width: 100%;
            margin-top: 1rem;
            display: none; /* مخفي حتى يتم الحساب */
        }

        .result-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem 1rem;
            text-align: center;
        }

        .result-card .number {
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: var(--font-en);
            margin-bottom: 0.3rem;
        }

        .result-card .label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* كرت العداد التنازلي ليوم الميلاد القادم */
        .next-birthday-card {
            width: 100%;
            background: rgba(59, 130, 246, 0.03);
            border: 1px dashed rgba(59, 130, 246, 0.2);
            border-radius: 18px;
            padding: 1.5rem;
            text-align: center;
            margin-top: 0.5rem;
            display: none;
        }

        .next-birthday-title {
            font-size: 0.95rem;
            color: #e2e8f0;
            margin-bottom: 0.8rem;
            font-weight: 600;
        }

        .countdown-timer {
            display: flex;
            justify-content: center;
            gap: 1rem;
            font-family: var(--font-en);
        }

        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .countdown-item .time {
            font-size: 1.5rem;
            font-weight: 700;
            color: #3b82f6;
        }

        .countdown-item .unit {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-family: var(--font-ar);
        }
        html[lang="en"] .countdown-item .unit { font-family: var(--font-en); }

        .ad-slot {
            width: 100%;
            min-height: 90px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px dashed rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            margin: 2rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.1);
            font-size: 0.75rem;
            font-family: var(--font-en);
        }

        @media (max-width: 500px) {
            .results-grid { grid-template-columns: 1fr; gap: 0.8rem; }
            .tool-box { padding: 2rem 1.2rem; }
            header h1 { font-size: 1.9rem; }
            .countdown-timer { gap: 0.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="back-btn" id="backBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            <span>الرئيسية</span>
        </a>
        <button class="lang-btn" onclick="toggleLanguage()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            <span id="langText">English</span>
        </button>
    </nav>

    <div class="container">
        <header>
            <h1 id="toolTitle">حاسبة العمر الدقيقة</h1>
            <p id="toolDesc">احسب عمرك بالتفصيل الممل واعرف كم تتبقى ثانية على يوم ميلادك القادم فورياً</p>
        </header>

        <div class="ad-slot">Advertisement Space (Top Banner)</div>

        <div class="tool-box">
            
            <div class="input-group">
                <label id="inputLabel">اختر تاريخ ميلادك:</label>
                <input type="date" id="birthdate">
            </div>

            <button class="btn-primary" onclick="calculateAge()" id="calcBtn">احسب العمر الآن ⏳</button>

            <div class="results-grid" id="resultsGrid">
                <div class="result-card">
                    <div class="number" id="resYears">0</div>
                    <div class="label" id="lblYears">سنوات</div>
                </div>
                <div class="result-card">
                    <div class="number" id="resMonths">0</div>
                    <div class="label" id="lblMonths">أشهر</div>
                </div>
                <div class="result-card">
                    <div class="number" id="resDays">0</div>
                    <div class="label" id="lblDays">أيام</div>
                </div>
            </div>

            <div class="next-birthday-card" id="nextBirthdayCard">
                <div class="next-birthday-title" id="nextBdayTitle">الوقت المتبقي ليوم ميلادك القادم:</div>
                <div class="countdown-timer">
                    <div class="countdown-item">
                        <div class="time" id="cdMonths">00</div>
                        <div class="unit" id="unitMonths">أشهر</div>
                    </div>
                    <div class="countdown-item">
                        <div class="time" id="cdDays">00</div>
                        <div class="unit" id="unitDays">أيام</div>
                    </div>
                    <div class="countdown-item">
                        <div class="time" id="cdHours">00</div>
                        <div class="unit" id="unitHours">ساعات</div>
                    </div>
                </div>
            </div>

        </div>

        <div class="ad-slot">Advertisement Space (Bottom Banner)</div>
    </div>

    <script>
        const translations = {
            ar: {
                langBtn: "English", backBtn: "الرئيسية",
                title: "حاسبة العمر الدقيقة | ToolnestHQ",
                toolTitle: "حاسبة العمر الدقيقة",
                toolDesc: "احسب عمرك بالتفصيل الممل واعرف كم تتبقى ثانية على يوم ميلادك القادم فورياً",
                inputLabel: "اختر تاريخ ميلادك:",
                calcBtn: "احسب العمر الآن ⏳",
                lblYears: "سنوات", lblMonths: "أشهر", lblDays: "أيام",
                nextBdayTitle: "الوقت المتبقي ليوم ميلادك القادم:",
                unitMonths: "أشهر", unitDays: "أيام", unitHours: "ساعات",
                alertEmpty: "الرجاء تحديد تاريخ ميلاد صحيح أولاً!"
            },
            en: {
                langBtn: "العربية", backBtn: "Home",
                title: "Precise Age Calculator | ToolnestHQ",
                toolTitle: "Age Calculator",
                toolDesc: "Calculate your detailed exact age and discover the countdown to your next birthday instantly",
                inputLabel: "Select Your Date of Birth:",
                calcBtn: "Calculate Age Now ⏳",
                lblYears: "Years", lblMonths: "Months", lblDays: "Days",
                nextBdayTitle: "Time Left Until Your Next Birthday:",
                unitMonths: "Months", unitDays: "Days", unitHours: "Hours",
                alertEmpty: "Please select a valid birthdate first!"
            }
        };

        let currentLang = 'ar';

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';

            document.title = translations[currentLang].title;
            document.getElementById('langText').textContent = translations[currentLang].langBtn;
            document.getElementById('backBtn').querySelector('span').textContent = translations[currentLang].backBtn;
            document.getElementById('toolTitle').textContent = translations[currentLang].toolTitle;
            document.getElementById('toolDesc').textContent = translations[currentLang].toolDesc;
            document.getElementById('inputLabel').textContent = translations[currentLang].inputLabel;
            document.getElementById('calcBtn').textContent = translations[currentLang].calcBtn;
            document.getElementById('lblYears').textContent = translations[currentLang].lblYears;
            document.getElementById('lblMonths').textContent = translations[currentLang].lblMonths;
            document.getElementById('lblDays').textContent = translations[currentLang].lblDays;
            document.getElementById('nextBdayTitle').textContent = translations[currentLang].nextBdayTitle;
            document.getElementById('unitMonths').textContent = translations[currentLang].unitMonths;
            document.getElementById('unitDays').textContent = translations[currentLang].unitDays;
            document.getElementById('unitHours').textContent = translations[currentLang].unitHours;

            if(currentLang === 'en') {
                document.getElementById('backBtn').querySelector('svg').style.transform = 'rotate(0deg)';
            } else {
                document.getElementById('backBtn').querySelector('svg').style.transform = 'rotate(180deg)';
            }
        }

        function calculateAge() {
            const birthdateInput = document.getElementById('birthdate').value;
            if (!birthdateInput) {
                alert(translations[currentLang].alertEmpty);
                return;
            }

            const birthDate = new Date(birthdateInput);
            const today = new Date();

            if (birthDate > today) {
                alert(currentLang === 'ar' ? "تاريخ الميلاد لا يمكن أن يكون في المستقبل!" : "Birthdate cannot be in the future!");
                return;
            }

            // 1. حساب العمر الحالي بدقة شديدة
            let years = today.getFullYear() - birthDate.getFullYear();
            let months = today.getMonth() - birthDate.getMonth();
            let days = today.getDate() - birthDate.getDate();

            if (days < 0) {
                months--;
                // الحصول على آخر يوم في الشهر السابق
                const previousMonth = new Date(today.getFullYear(), today.getMonth(), 0);
                days += previousMonth.getDate();
            }

            if (months < 0) {
                years--;
                months += 12;
            }

            // عرض لوحة تفاصيل العمر المعاش
            document.getElementById('resYears').textContent = years;
            document.getElementById('resMonths').textContent = months;
            document.getElementById('resDays').textContent = days;
            document.getElementById('resultsGrid').style.display = "grid";

            // 2. حساب موعد ومؤقت ميلاده القادم
            let nextBirthday = new Date(today.getFullYear(), birthDate.getMonth(), birthDate.getDate());
            
            // إذا كان تاريخ الميلاد مر هذا العام، فالميلاد القادم يكون العام المقبل
            if (today > nextBirthday) {
                nextBirthday.setFullYear(today.getFullYear() + 1);
            }

            let diffTime = nextBirthday - today;
            
            // تحويل الفارق الزمني إلى أشهر وأيام وساعات متبقية
            let totalHours = Math.floor(diffTime / (1000 * 60 * 60));
            let totalDays = Math.floor(totalHours / 24);
            let remainingHours = totalHours % 24;

            // حساب الأشهر والأيام التقريبية المتبقية
            let nextMonths = Math.floor(totalDays / 30.43); // متوسط أيام الشهر رقمياً
            let nextDays = Math.floor(totalDays % 30.43);

            document.getElementById('cdMonths').textContent = String(nextMonths).padStart(2, '0');
            document.getElementById('cdDays').textContent = String(nextDays).padStart(2, '0');
            document.getElementById('cdHours').textContent = String(remainingHours).padStart(2, '0');
            document.getElementById('nextBirthdayCard').style.display = "block";
        }
    </script>
</body>
</html>

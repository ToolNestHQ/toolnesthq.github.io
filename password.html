<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد ومحلل كود الحماية - ToolNestHQ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #030712;
            --card-bg: #0b0f19;
            --neon-cyan: #00f2fe;
            --neon-purple: #4facfe;
            --text-pure: #ffffff;
            --text-dim: #9ca3af;
            --secure-green: #10b981;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-pure);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .back-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 18px;
            border-radius: 12px;
            color: var(--text-pure);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .back-btn:hover { border-color: var(--neon-cyan); }

        .secure-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 440px;
            width: 100%;
            box-sizing: border-box;
            position: relative;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .secure-card::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--neon-purple), transparent, var(--neon-cyan), transparent);
            border-radius: 26px; z-index: -1; background-size: 200% 200%;
            animation: auroraBorder 6s linear infinite; opacity: 0.5;
        }

        @keyframes auroraBorder {
            0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
        }

        .icon-header { font-size: 50px; margin-bottom: 15px; color: var(--neon-purple); }
        h2 { margin: 0 0 10px 0; font-size: 24px; font-weight: 700; }
        .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 25px; }

        .output-box {
            background: #111827; border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px; padding: 15px; display: flex;
            justify-content: space-between; align-items: center; margin-bottom: 20px;
        }

        .password-display {
            font-family: 'Courier New', Courier, monospace; font-size: 18px;
            color: var(--neon-cyan); font-weight: bold; overflow-x: auto; white-space: nowrap; width: 85%; text-align: left;
        }

        .copy-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 18px; transition: color 0.2s; }
        .copy-btn:hover { color: var(--text-pure); }

        .range-group { text-align: right; margin-bottom: 20px; }
        .range-info { display: flex; justify-content: space-between; color: var(--text-dim); font-size: 13px; margin-bottom: 8px; }
        input[type="range"] { width: 100%; accent-color: var(--neon-cyan); }

        .gen-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, var(--neon-purple) 0%, var(--neon-cyan) 100%);
            border: none; border-radius: 14px; color: #030712; font-size: 16px; font-weight: 700;
            cursor: pointer; box-shadow: 0 0 20px rgba(79, 172, 254, 0.3);
        }

        .strength-box {
            margin-top: 25px; padding-top: 25px; border-top: 1px solid rgba(255, 255, 255, 0.08);
            text-align: right; display: none;
        }

        .strength-title { font-size: 14px; color: var(--text-dim); margin-bottom: 8px; }
        .strength-bar { height: 6px; width: 100%; background: #111827; border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
        .strength-fill { height: 100%; width: 0%; transition: all 0.3s ease; }
        .strength-text { font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">
        <i class="fa-solid fa-arrow-right"></i> الرئيسية
    </a>

    <div class="container">
        <div class="secure-card">
            <div class="icon-header"><i class="fa-solid fa-shield-halved"></i></div>
            <h2>مولد رموز الحماية الذكي</h2>
            <div class="subtitle">أنشئ كلمات مرور مشفرة وقوية يستحيل اختراقها بلمحة عين</div>

            <div class="output-box">
                <div class="password-display" id="passDisplay">اضغط على التوليد المباشر</div>
                <button class="copy-btn" onclick="copyPassword()"><i class="fa-regular fa-copy"></i></button>
            </div>

            <div class="range-group">
                <div class="range-info">
                    <span>طول كلمة المرور:</span>
                    <span id="lengthVal" style="color: var(--neon-cyan); font-weight: bold;">12 حرف</span>
                </div>
                <input type="range" id="passLength" min="8" max="30" value="12" oninput="updateLengthLabel()">
            </div>

            <button class="gen-btn" onclick="generatePassword()">توليد رمز مشفر</button>

            <div class="strength-box" id="strengthBox">
                <div class="strength-title">تحليل مستوى الأمان الحالي:</div>
                <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                <div class="strength-text" id="strengthText">-</div>
            </div>
        </div>
    </div>

    <script>
        function updateLengthLabel() {
            const len = document.getElementById('passLength').value;
            document.getElementById('lengthVal').innerText = len + " حرف";
        }

        function generatePassword() {
            const length = document.getElementById('passLength').value;
            const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+~`|}{[]:;?><,./-=";
            let password = "";
            
            // توليد آمن وعشوائي تماماً
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * chars.length);
                password += chars.charAt(randomIndex);
            }

            document.getElementById('passDisplay').innerText = password;
            document.getElementById('strengthBox').style.display = 'block';

            // تحليل القوة بناء على الطول
            const fill = document.getElementById('strengthFill');
            const txt = document.getElementById('strengthText');

            if (length < 11) {
                fill.style.width = '35%'; fill.style.backgroundColor = '#ef4444';
                txt.innerText = 'حماية متوسطة - يفضل زيادة الطول'; txt.style.color = '#ef4444';
            } else if (length >= 11 && length < 16) {
                fill.style.width = '70%'; fill.style.backgroundColor = '#f59e0b';
                txt.innerText = 'حماية قوية جداً وآمنة للاستخدام العام'; txt.style.color = '#f59e0b';
            } else {
                fill.style.width = '100%'; fill.style.backgroundColor = 'var(--secure-green)';
                txt.innerText = 'حماية سيبرانية خارقة - يستحيل فك تشفيرها عشوائياً'; txt.style.color = 'var(--secure-green)';
            }
        }

        function copyPassword() {
            const passText = document.getElementById('passDisplay').innerText;
            if (passText === "اضغط على التوليد المباشر") return;
            
            navigator.clipboard.writeText(passText).then(() => {
                alert('تم نسخ كلمة المرور المشفرة بنجاح! 🔐');
            });
        }
    </script>

</body>
</html>

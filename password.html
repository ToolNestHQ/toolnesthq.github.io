<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مُولّد كلمات المرور - ToolNestHQ</title>
    <style>
        body { font-family: sans-serif; background-color: #060813; color: white; text-align: center; padding: 20px; }
        input { padding: 10px; width: 80%; max-width: 300px; margin-bottom: 10px; text-align: center; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>مُولّد كلمات المرور</h1>
    <input type="text" id="password" readonly placeholder="كلمة المرور ستظهر هنا">
    <br>
    <button onclick="generatePassword()">توليد كلمة مرور</button>

    <script>
        function generatePassword() {
            const length = 12;
            const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
            let retVal = "";
            for (let i = 0, n = charset.length; i < length; ++i) {
                retVal += charset.charAt(Math.floor(Math.random() * n));
            }
            document.getElementById("password").value = retVal;
        }
    </script>
    <br><br>
    <a href="index.html" style="color: #aaa;">العودة للرئيسية</a>

</body>
</html>

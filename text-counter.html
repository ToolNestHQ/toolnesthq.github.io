<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عداد ومحلل النصوص الذكي | ToolnestHQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #070a13;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --text-muted: #64748b;
            --accent-gradient: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%); /* ألوان تقنية منعشة */
            --hover-glow: rgba(6, 182, 212, 0.25);
            --input-bg: rgba(0, 0, 0, 0.3);
            --font-ar: 'Cairo', sans-serif;
            --font-en: 'Poppins', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: var(--font-ar);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(6, 182, 212, 0.05), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.05), transparent 30%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        html[lang="en"] body {
            font-family: var(--font-en);
        }

        /* شريط التنقل */
        nav {
            width: 100%;
            max-width: 800px;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn:hover { color: var(--text-main); }

        .lang-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .lang-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px var(--hover-glow);
        }

        .container {
            width: 100%;
            max-width: 750px;
            padding: 0 1.5rem 4rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 2.4rem;
            font-weight: 900;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* لوحة التحكم الرئيسية */
        .tool-box {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* شبكة الإحصائيات العلوية */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            width: 100%;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.2rem 0.5rem;
            text-align: center;
        }

        .stat-card .num {
            font-size: 1.8rem;
            font-weight: 800;
            color: #06b6d4;
            font-family: var(--font-en);
            margin-bottom: 0.2rem;
        }

        .stat-card .label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* صندوق إدخال النص الكبير */
        .text-area-container {
            width: 100%;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 280px;
            padding: 1.2rem;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            color: #fff;
            font-size: 1.1rem;
            font-family: inherit;
            outline: none;
            resize: vertical;
            line-height: 1.6;
        }

        textarea:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.15);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        /* شريط الأدوات السفلي لحذف النص أو نسخه */
        .action-bar {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            color: #e2e8f0;
            padding: 0.7rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .btn-clear {
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }
        .btn-clear:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .ad-slot {
            width: 100%;
            min-height: 90px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px dashed rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            margin: 2rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.1);
            font-size: 0.75rem;
            font-family: var(--font-en);
        }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
            .tool-box { padding: 1.8rem 1.2rem; }
            header h1 { font-size: 1.9rem; }
            .action-bar { justify-content: space-between; }
            .btn-action { flex: 1; justify-content: center; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="back-btn" id="backBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            <span>الرئيسية</span>
        </a>
        <button class="lang-btn" onclick="toggleLanguage()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            <span id="langText">English</span>
        </button>
    </nav>

    <div class="container">
        <header>
            <h1 id="toolTitle">عداد ومحلل النصوص</h1>
            <p id="toolDesc">احسب عدد الكلمات، الحروف، الفقرات، وزمن القراءة المتوقع لنصك فورياً وبدقة</p>
        </header>

        <div class="ad-slot">Advertisement Space (Top Banner)</div>

        <div class="tool-box">
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="num" id="countWords">0</div>
                    <div class="label" id="lblWords">الكلمات</div>
                </div>
                <div class="stat-card">
                    <div class="num" id="countChars">0</div>
                    <div class="label" id="lblChars">الحروف</div>
                </div>
                <div class="stat-card">
                    <div class="num" id="countParagraphs">0</div>
                    <div class="label" id="lblParagraphs">الفقرات</div>
                </div>
                <div class="stat-card">
                    <div class="num" id="countReadingTime">0</div>
                    <div class="label" id="lblReadingTime">وقت القراءة</div>
                </div>
            </div>

            <div class="text-area-container">
                <textarea id="textInput" placeholder="ابدأ بكتابة أو لصق نصك هنا لتحليله فوراً..." oninput="analyzeText()"></textarea>
            </div>

            <div class="action-bar">
                <button class="btn-action btn-clear" onclick="clearText()" id="btnClear">مسح النص</button>
                <button class="btn-action" onclick="copyText()" id="btnCopy">نسخ النص</button>
            </div>

        </div>

        <div class="ad-slot">Advertisement Space (Bottom Banner)</div>
    </div>

    <script>
        const translations = {
            ar: {
                langBtn: "English", backBtn: "الرئيسية",
                title: "عداد ومحلل النصوص الذكي | ToolnestHQ",
                toolTitle: "عداد ومحلل النصوص",
                toolDesc: "احسب عدد الكلمات، الحروف، الفقرات، وزمن القراءة المتوقع لنصك فورياً وبدقة",
                lblWords: "الكلمات", lblChars: "الحروف", lblParagraphs: "الفقرات", 
                lblReadingTime: "وقت القراءة",
                placeholder: "ابدأ بكتابة أو لصق نصك هنا لتحليله فوراً...",
                btnClear: "مسح النص", btnCopy: "نسخ النص",
                unitMinutes: " دقيقة", unitSeconds: " ثانية"
            },
            en: {
                langBtn: "العربية", backBtn: "Home",
                title: "Smart Word & Character Counter | ToolnestHQ",
                toolTitle: "Word Counter",
                toolDesc: "Instantly analyze word count, character count, paragraphs, and estimated reading time",
                lblWords: "Words", lblChars: "Characters", lblParagraphs: "Paragraphs", 
                lblReadingTime: "Reading Time",
                placeholder: "Start typing or pasting your text here for real-time analysis...",
                btnClear: "Clear Text", btnCopy: "Copy Text",
                unitMinutes: " min", unitSeconds: " sec"
            }
        };

        let currentLang = 'ar';

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';

            document.title = translations[currentLang].title;
            document.getElementById('langText').textContent = translations[currentLang].langBtn;
            document.getElementById('backBtn').querySelector('span').textContent = translations[currentLang].backBtn;
            document.getElementById('toolTitle').textContent = translations[currentLang].toolTitle;
            document.getElementById('toolDesc').textContent = translations[currentLang].toolDesc;
            document.getElementById('lblWords').textContent = translations[currentLang].lblWords;
            document.getElementById('lblChars').textContent = translations[currentLang].lblChars;
            document.getElementById('lblParagraphs').textContent = translations[currentLang].lblParagraphs;
            document.getElementById('lblReadingTime').textContent = translations[currentLang].lblReadingTime;
            document.getElementById('textInput').placeholder = translations[currentLang].placeholder;
            document.getElementById('btnClear').textContent = translations[currentLang].btnClear;
            document.getElementById('btnCopy').textContent = translations[currentLang].btnCopy;

            if(currentLang === 'en') {
                document.getElementById('backBtn').querySelector('svg').style.transform = 'rotate(0deg)';
            } else {
                document.getElementById('backBtn').querySelector('svg').style.transform = 'rotate(180deg)';
            }
            
            analyzeText(); // إعادة حساب وتحديث نصوص وحدات الوقت
        }

        function analyzeText() {
            const text = document.getElementById('textInput').value;

            // 1. حساب الحروف
            const charCount = text.length;

            // 2. حساب الكلمات بشكل نظيف لتجنب الفراغات الزائدة
            const cleanText = text.trim().replace(/\s+/g, ' ');
            const wordCount = cleanText === '' ? 0 : cleanText.split(' ').length;

            // 3. حساب الفقرات (الأسطر المكتوبة)
            const paragraphCount = text.split(/\n/).filter(p => p.trim() !== '').length;

            // 4. حساب وقت القراءة المتوقع (المعدل العالمي الإنساني هو 200 كلمة بالدقيقة)
            let readingTimeStr = "0" + (currentLang === 'ar' ? " ثانية" : " sec");
            if (wordCount > 0) {
                const totalSeconds = Math.ceil((wordCount / 200) * 60);
                if (totalSeconds < 60) {
                    readingTimeStr = totalSeconds + translations[currentLang].unitSeconds;
                } else {
                    const mins = Math.floor(totalSeconds / 60);
                    readingTimeStr = mins + translations[currentLang].unitMinutes;
                }
            }

            // تحديث شاشة العرض الرقمية فورياً
            document.getElementById('countChars').textContent = charCount;
            document.getElementById('countWords').textContent = wordCount;
            document.getElementById('countParagraphs').textContent = paragraphCount;
            document.getElementById('countReadingTime').textContent = readingTimeStr;
        }

        function clearText() {
            document.getElementById('textInput').value = "";
            analyzeText();
        }

        function copyText() {
            const textarea = document.getElementById('textInput');
            if (textarea.value === "") return;
            
            navigator.clipboard.writeText(textarea.value);
            // تغيير نص الزر مؤقتاً كنوع من التفاعل الفخم مع المستخدم
            const btn = document.getElementById('btnCopy');
            const originalText = btn.textContent;
            btn.textContent = currentLang === 'ar' ? "✓ تم النسخ" : "✓ Copied";
            setTimeout(() => { btn.textContent = originalText; }, 2000);
        }
    </script>
</body>
</html>

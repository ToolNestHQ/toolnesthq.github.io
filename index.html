<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolNestHQ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-panel: rgba(255, 255, 255, 0.03);
            --glass-card: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-pure: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --body-bg: #070a12; /* أسود ملكي عميق جداً */
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--body-bg);
            color: var(--text-pure);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* لوحة التحكم الزجاجية الضبابية الكبيرة */
        .dashboard-panel {
            background: var(--glass-panel);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-radius: 32px;
            padding: 40px 25px;
            max-width: 900px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .dashboard-header {
            margin-bottom: 35px;
        }

        .dashboard-header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            opacity: 0.95;
        }

        /* شبكة الأدوات - تظهر بشكل متناسق ومتقابل */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            width: 100%;
        }

        /* أزرار الأدوات داخل اللوحة */
        .tool-box {
            background: var(--glass-card);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .tool-box:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.03);
        }

        .tool-icon {
            font-size: 45px;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        .tool-title-ar {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .tool-title-en {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dim);
            direction: ltr;
            margin-bottom: 12px;
        }

        .tool-box p {
            margin: 0;
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <!-- لوحة التحكم الرئيسية المستقلة -->
    <div class="dashboard-panel">
        
        <div class="dashboard-header">
            <h1>ToolNestHQ</h1>
        </div>

        <!-- شبكة الأدوات المرتبة -->
        <div class="tools-grid">
            
            <!-- أداة الباركود -->
            <a href="qr.html" class="tool-box">
                <div class="tool-icon"><i class="fa-solid fa-qrcode"></i></div>
                <div class="tool-title-ar">صانع الباركود</div>
                <div class="tool-title-en">(QR Code)</div>
                <p>أنشئ رموز QR مخصصة لروابطك ونصوصك بسهولة ودقة</p>
            </a>

            <!-- أداة حاسبة العمر -->
            <a href="age.html" class="tool-box">
                <div class="tool-icon"><i class="fa-solid fa-calculator"></i></div>
                <div class="tool-title-ar">حاسبة العمر</div>
                <div class="tool-title-en">(Age Calculator)</div>
                <p>احسب عمرك بالتفصيل بالسنوات، الأشهر، والأيام بلمحة عين</p>
            </a>

        </div>

    </div>

</body>
</html>

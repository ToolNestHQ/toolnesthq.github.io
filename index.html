<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ToolNestHQ - الأدوات الرقمية الاحترافية</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" defer></script>
</head>
<body>
    
    <div class="fluid-background">
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
        <div class="wave wave3"></div>
    </div>
    
    <div class="main-glass-container">
        
        <header class="main-header">
            <h1 class="brand-title">ToolNestHQ<span>.</span></h1>
            <div class="status-indicators">
                <span>PLATFORM STATUS: OPTIMAL</span>
                <span class="users-online">USERS ONLINE: 423</span>
            </div>
        </header>

        <main class="content-view" id="main-stage">
            
            <div class="integrated-dashboard">
                <p class="welcome-text">مرحباً بك في المنصة الذكية.</p>
            </div>

        </main>
        
        <footer class="main-footer">
            <div class="floating-particles"></div>
        </footer>
    </div>

    <script src="script.js" defer></script>
</body>
</html>

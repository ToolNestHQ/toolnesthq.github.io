<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToolNestHQ</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
text-align:center;
}

header{
padding:40px 20px;
}

h1{
font-size:42px;
margin-bottom:10px;
}

p{
color:#cbd5e1;
}

.tools{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
max-width:1000px;
margin:auto;
}

.card{
background:#1e293b;
padding:25px;
border-radius:15px;
transition:.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
background:#334155;
}

footer{
padding:30px;
color:#94a3b8;
}
</style>

</head>

<body>

<header>
<h1>ToolNestHQ</h1>
<p>أفضل الأدوات المجانية أونلاين</p>
</header>

<section class="tools">

<div class="card">
<h2>Image Compressor</h2>
<p>Coming Soon</p>
</div>

<div class="card">
<h2>QR Generator</h2>
<p>Coming Soon</p>
</div>

<div class="card">
<h2>Password Generator</h2>
<p>Coming Soon</p>
</div>

<div class="card">
<h2>Word Counter</h2>
<p>Coming Soon</p>
</div>

</section>

<footer>
© 2026 ToolNestHQ
</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مولد وسوم الميتا | Meta Tag Generator | ToolnestHQ</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:#fff;
}

.container{
    max-width:800px;
    margin:40px auto;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

h1 span{
    color:#94a3b8;
    font-size:18px;
}

input,textarea{
    width:100%;
    padding:15px;
    margin:12px 0;
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:#fff;
    font-size:16px;
    box-sizing:border-box;
}

textarea{
    min-height:120px;
    resize:vertical;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

pre{
    background:#111827;
    margin-top:20px;
    padding:20px;
    border-radius:12px;
    white-space:pre-wrap;
    overflow:auto;
}

.copy-btn{
    margin-top:15px;
    background:#16a34a;
}

.copy-btn:hover{
    background:#15803d;
}
</style>

</head>
<body>

<div class="container">

<h1>
مولد وسوم الميتا
<br>
<span>Meta Tag Generator</span>
</h1>

<input id="title" placeholder="عنوان الموقع | Website Title">

<textarea id="description" placeholder="وصف الموقع | Website Description"></textarea>

<input id="keywords" placeholder="الكلمات المفتاحية | Keywords">

<input id="author" placeholder="اسم المؤلف | Author">

<button onclick="generate()">
إنشاء وسوم الميتا | Generate Meta Tags
</button>

<pre id="output"></pre>

<button class="copy-btn" onclick="copyCode()">
نسخ الكود | Copy Code
</button>

</div>

<script>

function generate(){

let title=document.getElementById("title").value;
let description=document.getElementById("description").value;
let keywords=document.getElementById("keywords").value;
let author=document.getElementById("author").value;

let code=`<title>${title}</title>

<meta name="title" content="${title}">
<meta name="description" content="${description}">
<meta name="keywords" content="${keywords}">
<meta name="author" content="${author}">
<meta name="robots" content="index, follow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">`;

document.getElementById("output").textContent=code;

}

function copyCode(){

let text=document.getElementById("output").textContent;

navigator.clipboard.writeText(text);

alert("✅ تم نسخ الكود");

}

</script>

</body>
</html>

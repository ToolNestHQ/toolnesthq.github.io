<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المؤقت - ToolNestHQ</title>
    <style>
        body { font-family: sans-serif; background-color: #060813; color: white; text-align: center; padding: 20px; }
        input { padding: 10px; width: 80%; max-width: 300px; margin-bottom: 10px; text-align: center; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>مؤقت تنازلي</h1>
    <input type="number" id="seconds" placeholder="عدد الثواني...">
    <br>
    <button onclick="startTimer()">ابدأ</button>
    <h2 id="timer">0</h2>

    <script>
        function startTimer() {
            let count = document.getElementById("seconds").value;
            const timerDisplay = document.getElementById("timer");
            let interval = setInterval(() => {
                count--;
                timerDisplay.innerHTML = count;
                if (count <= 0) {
                    clearInterval(interval);
                    alert("انتهى الوقت!");
                }
            }, 1000);
        }
    </script>
    <br>
    <a href="index.html" style="color: #aaa;">العودة للرئيسية</a>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عداد التنازلي الذكي - ToolNestHQ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #030712;
            --card-bg: #0b0f19;
            --neon-cyan: #00f2fe;
            --neon-purple: #4facfe;
            --text-pure: #ffffff;
            --text-dim: #9ca3af;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-pure);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .back-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 18px;
            border-radius: 12px;
            color: var(--text-pure);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .back-btn:hover { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); }

        .countdown-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 460px;
            width: 100%;
            box-sizing: border-box;
            position: relative;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .countdown-card::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--neon-purple), transparent, var(--neon-cyan), transparent);
            border-radius: 26px; z-index: -1; background-size: 200% 200%;
            animation: auroraBorder 6s linear infinite; opacity: 0.5;
        }

        @keyframes auroraBorder {
            0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
        }

        .icon-header { font-size: 50px; margin-bottom: 15px; color: var(--neon-purple); text-shadow: 0 0 15px rgba(79, 172, 254, 0.4); }
        h2 { margin: 0 0 10px 0; font-size: 24px; font-weight: 700; }
        .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 25px; }

        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; font-size: 13px; margin-bottom: 8px; color: var(--text-dim); }

        input[type="datetime-local"], input[type="text"] {
            width: 100%; padding: 15px; background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 14px;
            color: #ffffff; font-size: 16px; box-sizing: border-box; outline: none; text-align: center;
        }

        input:focus { border-color: var(--neon-cyan); }

        .start-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, var(--neon-purple) 0%, var(--neon-cyan) 100%);
            border: none; border-radius: 14px; color: #030712;
            font-size: 16px; font-weight: 700; cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3); margin-bottom: 25px;
        }

        .clock-display { display: none; margin-top: 20px; animation: fadeIn 0.5s ease; }
        .event-title-show { font-size: 18px; font-weight: 700; color: #ffffff; margin-bottom: 15px; }
        
        .grid-clock { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .clock-box { background: #111827; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 15px 5px; }
        .clock-num { font-size: 26px; font-weight: 800; color: var(--neon-cyan); }
        .clock-label { font-size: 11px; color: var(--text-dim); margin-top: 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-right"></i> الرئيسية</a>

    <div class="countdown-card">
        <div class="icon-header"><i class="fa-regular fa-clock"></i></div>
        <h2>حاسبة الوقت التنازلي</h2>
        <div class="subtitle">احسب الوقت المتبقي لمناسباتك الهامة بالثواني والدقائق</div>

        <div class="input-group">
            <label>اسم المناسبة:</label>
            <input type="text" id="eventName" placeholder="مثال: تخرجي، موعد الاختبار الكيمياء...">
        </div>

        <div class="input-group">
            <label>اختر التاريخ والوقت:</label>
            <input type="datetime-local" id="eventDate">
        </div>

        <button class="start-btn" onclick="startCountdown()">بدأ العد التنازلي</button>

        <div class="clock-display" id="clockDisplay">
            <div class="event-title-show" id="showName">-</div>
            <div class="grid-clock">
                <div class="clock-box"><div class="clock-num" id="cDays">00</div><div class="clock-label">يوم</div></div>
                <div class="clock-box"><div class="clock-num" id="cHours">00</div><div class="clock-label">ساعة</div></div>
                <div class="clock-box"><div class="clock-num" id="cMinutes">00</div><div class="clock-label">دقيقة</div></div>
                <div class="clock-box"><div class="clock-num" id="cSeconds">00</div><div class="clock-label">ثانية</div></div>
            </div>
        </div>
    </div>

    <script>
        let countdownInterval;

        function startCountdown() {
            clearInterval(countdownInterval);
            const name = document.getElementById('eventName').value.trim() || "المناسبة المحددة";
            const dateValue = document.getElementById('eventDate').value;

            if (!dateValue) { alert('الرجاء اختيار التاريخ والوقت أولاً!'); return; }

            const targetDate = new Date(dateValue).getTime();
            document.getElementById('showName').innerText = name;
            document.getElementById('clockDisplay').style.display = 'block';

            countdownInterval = setInterval(() => {
                const now = new Date().getTime();
                const difference = targetDate - now;

                if (difference <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('cDays').innerText = "00";
                    document.getElementById('cHours').innerText = "00";
                    document.getElementById('cMinutes').innerText = "00";
                    document.getElementById('cSeconds').innerText = "00";
                    alert('حان موعد المناسبة الآن! 🎉');
                    return;
                }

                const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((difference % (1000 * 60)) / 1000);

                document.getElementById('cDays').innerText = String(days).padStart(2, '0');
                document.getElementById('cHours').innerText = String(hours).padStart(2, '0');
                document.getElementById('cMinutes').innerText = String(minutes).padStart(2, '0');
                document.getElementById('cSeconds').innerText = String(seconds).padStart(2, '0');
            }, 1000);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحول الذكي - ToolNestHQ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #030712;
            --card-bg: #0b0f19;
            --neon-cyan: #00f2fe;
            --neon-purple: #4facfe;
            --text-pure: #ffffff;
            --text-dim: #9ca3af;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-pure);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .back-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 18px;
            border-radius: 12px;
            color: var(--text-pure);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .back-btn:hover { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); }

        .converter-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 440px;
            width: 100%;
            box-sizing: border-box;
            position: relative;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .converter-card::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--neon-cyan), transparent, var(--neon-purple), transparent);
            border-radius: 26px; z-index: -1; background-size: 200% 200%;
            animation: auroraBorder 6s linear infinite; opacity: 0.5;
        }

        @keyframes auroraBorder {
            0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
        }

        .icon-header { font-size: 50px; margin-bottom: 15px; color: var(--neon-cyan); }
        h2 { margin: 0 0 10px 0; font-size: 24px; font-weight: 700; }
        .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 25px; }

        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; font-size: 13px; margin-bottom: 8px; color: var(--text-dim); }

        select, input[type="number"] {
            width: 100%; padding: 15px; background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 14px;
            color: #ffffff; font-size: 16px; box-sizing: border-box; outline: none;
        }

        select:focus, input[type="number"]:focus { border-color: var(--neon-cyan); }

        .result-box {
            margin-top: 25px; padding: 20px; background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px;
            text-align: center;
        }

        .result-val { font-size: 24px; font-weight: 800; color: var(--neon-purple); }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-right"></i> الرئيسية</a>

    <div class="converter-card">
        <div class="icon-header"><i class="fa-solid fa-arrows-rotate"></i></div>
        <h2>محوّل الوحدات والعملات الذكي</h2>
        <div class="subtitle">حوّل بين العملات، الأطوال، والحرارة فوراً بدقة عالية</div>

        <div class="input-group">
            <label>نوع التحويل:</label>
            <select id="convertType" onchange="updateUnits()">
                <option value="currency">العملات (دولار ⇆ ريال سعودي)</option>
                <option value="length">المسافة (متر ⇆ كيلومتر)</option>
                <option value="temp">درجة الحرارة (سيليزي ⇆ فهرنهايت)</option>
            </select>
        </div>

        <div class="input-group">
            <label>القيمة المراد تحويلها:</label>
            <input type="number" id="inputValue" value="1" oninput="performConversion()">
        </div>

        <div class="input-group">
            <label>اتجاه التحويل:</label>
            <select id="unitDirection" onchange="performConversion()"></select>
        </div>

        <div class="result-box">
            <label>النتيجة المحسوبة:</label>
            <div class="result-val" id="resultDisplay">-</div>
        </div>
    </div>

    <script>
        const unitData = {
            currency: [{ text: "من دولار أمريكي ($) إلى ريال سعودي (ر.س)", calc: v => (v * 3.75).toFixed(2) + " ر.س", reverse: "من ريال سعودي (ر.س) إلى دولار أمريكي ($)", calcRev: v => (v / 3.75).toFixed(2) + " $" }],
            length: [{ text: "من كيلومتر إلى متر", calc: v => (v * 1000) + " متر", reverse: "من متر إلى كيلومتر", calcRev: v => (v / 1000) + " كم" }],
            temp: [{ text: "من سيليزي (°C) إلى فهرنهايت (°F)", calc: v => ((v * 9/5) + 32).toFixed(1) + " °F", reverse: "من فهرنهايت (°F) إلى سيليزي (°C)", calcRev: v => (((v - 32) * 5/9)).toFixed(1) + " °C" }]
        };

        function updateUnits() {
            const type = document.getElementById('convertType').value;
            const directionSelect = document.getElementById('unitDirection');
            directionSelect.innerHTML = "";
            
            unitData[type].forEach(item => {
                directionSelect.innerHTML += `<option value="forward">${item.text}</option>`;
                directionSelect.innerHTML += `<option value="backward">${item.reverse}</option>`;
            });
            performConversion();
        }

        function performConversion() {
            const type = document.getElementById('convertType').value;
            const val = parseFloat(document.getElementById('inputValue').value);
            const dir = document.getElementById('unitDirection').value;
            const display = document.getElementById('resultDisplay');

            if (isNaN(val)) { display.innerText = "-"; return; }

            const currentUnit = unitData[type][0];
            if (dir === "forward") {
                display.innerText = currentUnit.calc(val);
            } else {
                display.innerText = currentUnit.calcRev(val);
            }
        }

        window.onload = updateUnits;
    </script>
</body>
</html>
